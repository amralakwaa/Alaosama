version: '3.8'

services:
  # ─── MySQL 8.0 ────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: orion_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: orion_root_2024
      MYSQL_DATABASE: orion_db
      MYSQL_USER: orion_user
      MYSQL_PASSWORD: orion_pass_2024
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=caching_sha2_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: orion_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Adminer (DB GUI) ────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: orion_adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
